<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>全明星街球派對 - 限時申請</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background"></div>
    <div class="floating">
        <span>🏀</span><span>⭐</span><span>🎧</span>
        <span>🏀</span><span>⚡</span><span>🔥</span>
    </div>

    <div class="container">
        <img src="logo.png" alt="Streetball Logo" class="logo">
        
        <div class="preview-card">
            <img src="preview.jpg" alt="街球派對活動">
        </div>

        <h1>全明星 <span>街球派對</span></h1>
        <p class="subtitle">立即報名，挑戰街頭傳奇稱號</p>

        <div class="countdown-box">
            <div class="count-title">報名截止倒數</div>
            <div id="countdown">3天 00:00:00</div>
        </div>

        <div class="reward-box">
            <div class="reward-title">🏆 派對獎勵</div>
            <ul>
                <li>🔥 限定街頭球衣 x1</li>
                <li>💎 鑽石 x2000</li>
                <li>🎧 傳奇 DJ 球鞋 x1</li>
                <li>⭐ 街球之王頭像框</li>
            </ul>
        </div>

        <a href="#" class="join-btn" id="applyBtn">立即申請入場</a>

        <p class="notice">*每帳號限申請一次，審核通過後發放獎勵</p>
    </div>

    <script>
        // 倒數計時 - 設3天後
        const endTime = new Date().getTime() + 3 * 24 * 60 * 60 * 1000;
        
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = endTime - now;
            
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "報名已截止";
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('countdown').innerHTML = 
                `${days}天 ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // 按鈕波紋
        document.getElementById('applyBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const btn = e.currentTarget;
            const ripple = document.createElement('span');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');
            
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);
            
            alert('申請已送出！請等待審核');
        });
    </script>
</body>
</html>

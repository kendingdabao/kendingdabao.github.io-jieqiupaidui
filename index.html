<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>全明星街球派對 - 領取活動禮包</title>
    
    <!-- 社群分享預覽圖 -->
    <meta property="og:title" content="全明星街球派對 - 領取活動禮包">
    <meta property="og:description" content="領取活動禮包：隨機抽取球衣「六選一」x1，巨星珍藏自選箱x1，派對貴賓限時折扣！活動時間 6/29-7/10">
    <meta property="og:image" content="https://kendingdabao.github.io/kendingdabao.github.io-jieqiupaidui/preview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://kendingdabao.github.io/kendingdabao.github.io-jieqiupaidui/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="全明星街球派對">
    
    <!-- Twitter/Discord 預覽 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="全明星街球派對 - 領取活動禮包">
    <meta name="twitter:description" content="領取活動禮包：隨機抽取球衣「六選一」x1，巨星珍藏自選箱x1，派對貴賓限時折扣！">
    <meta name="twitter:image" content="https://kendingdabao.github.io/kendingdabao.github.io-jieqiupaidui/preview.jpg">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background"></div>
    <div class="floating">
        <span>🏀</span><span>⭐</span><span>🎧</span>
        <span>🏀</span><span>⚡</span><span>🔥</span>
    </div>

    <div class="container">
        <img src="logo.png" alt="Streetball Logo" class="logo">
        
        <div class="preview-card">
            <img src="preview.jpg" alt="街球派對活動">
        </div>

        <h1>全明星 <span>街球派對</span></h1>
        <p class="subtitle">立即報名，領取限時好禮</p>

        <div class="countdown-box">
            <div class="count-title">活動時間：6/29 - 7/10 23:59</div>
            <div id="countdown">10天 00:00:00</div>
        </div>

        <div class="reward-box">
            <div class="reward-title">🏆 領取活動禮包</div>
            <ul>
                <li>🔥 隨機抽取球衣「六選一」x1</li>
                <li>📦 巨星珍藏自選箱 x1</li>
                
                <li class="reward-section">💎 派對貴賓 - 終身回饋 限時折扣</li>
                <li>💎 每日可獲得 100 鑽石</li>
                <li>🎧 專屬頭像 (永久)</li>
                <li>⚡ 王朝模式連續配對場次 +5</li>
                <li>🔥 5對5全場爭霸連續配對場次 +5</li>
                <li>💎 立即獲得 x980 鑽石</li>
            </ul>
        </div>

        <a href="https://lin.ee/xEkSvR9H" class="join-btn" id="applyBtn" target="_blank">立即領取</a>

        <p class="notice">*每個玩家限申請一次</p>
    </div>

    <script>
        const endTime = new Date('2026-07-10T23:59:59').getTime();
        
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = endTime - now;
            
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "活動已結束";
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('countdown').innerHTML = 
                `${days}天 ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();

        document.getElementById('applyBtn').addEventListener('click', function(e) {
            const btn = e.currentTarget;
            const ripple = document.createElement('span');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');
            
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);
        });
    </script>
</body>
</html>
